<main>
    <h1>Course Proposal Application</h1>
        <form method="get" action="thanks.html" class="wf1">
            <fieldset>
                <legend>Applicant Information</legend>
                <label for="fname">First Name*</label>
                <input type="text" id="fname" name="fname" required>

                <label for="lname">Last Name*</label>
                <input type="text" id="lname" name="lname" required>

                <label for="email">Email*</label>
                <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="1232555563">
                <label for="website">Website*</label>
                <input type="url" id="website" name="website" placeholder="https://www.example.com">
            </fieldset>

            <fieldset>
                <legend>Course Information</legend>
                <div>Audience</div>
                <label for="audience"><input type="radio" id="audience" name="audience" value="beginner"> Beginner</label>
                <label for="audience"><input type="radio" id="audience" name="audience" value="intermediate"> Intermediate</label>
                <label for="audience"><input type="radio" id="audience" name="audience" value="advanced"> Advanced</label>

                <div>Software Needed</div>
                <label for="software"><input type="checkbox" id="software" name="software" value="html"> HTML</label>
                <label for="software"><input type="checkbox" id="software" name="software" value="css"> CSS</label>
                <label for="software"><input type="checkbox" id="software" name="software" value="javascript"> JavaScript</label>
                <label for="software"><input type="checkbox" id="software" name="software" value="other"> Other</label>

            </fieldset>
            <fieldset>
                <legend>Funding</legend>
                <label for="description">Aticipated Completion Date</label>
                <input type="date" id="description" name="completedDate">
                <label for="description">Course Subject
                    <select id="description" name="courseSubject">
                        <option value="">Select a subject &#9662;</option>
                        <option value="webdesign">Web Design</option>
                        <option value="webdevelopment">Web Development</option>
                        <option value="ux">UX Design</option>
                        <option value="other">Other</option>
                    </select>

                </label>
                <label for="description">How Many Authors</label>
                <input type="number" id="description" name="authors" min="1" max="10">

            </fieldset>
            <input type="submit" value="Submit Proposal">
        </form>

          
        
    </main>
