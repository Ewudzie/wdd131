<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="week03/styles/responsive-images.css">
    <link rel="preconnect" href="https://fonts.googleapis.com"> 

    <title>Document</title>
</head>
<body>
    <main>
        <div class="hero">
            picture element with multiple sources for responsive images
             <picture>      
                <source srcset="images/hero-large.webp" media="(max-width: 1000px)">
                <source srcset="images/hero-medium.webp" media="(max-width: 500px)">
                <img src="images/hero-small.webp" alt="Temple name and location" width="500" height="250">
            </picture>  
        </div>
    </main>

    
</body>
</html>
